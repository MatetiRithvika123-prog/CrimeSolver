<!DOCTYPE html>

<html>
<head>
  <title>Crime Solver AI</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      margin-top:80px;
      background:#f5f5f5;
    }

    h2{
      color:#222;
    }

    input{
      margin-top:20px;
    }

    button{
      padding:10px 20px;
      font-size:16px;
      margin-left:10px;
      cursor:pointer;
    }

    #status{
      margin-top:20px;
      font-size:16px;
      color:#555;
    }

    #result{
      margin-top:20px;
      font-size:24px;
      font-weight:bold;
      color:#b71c1c;
    }
  </style>

</head>

<body>

<h2>Crime Scene Image Analysis</h2>

<input type="file" id="imageInput">
<button onclick="analyze()">Analyze</button>

<p id="status"></p>
<p id="result"></p>

<script>

async function analyze(){

  const file = document.getElementById("imageInput").files[0];

  if(!file){
    alert("Please select an image");
    return;
  }

  document.getElementById("status").innerText = "Analyzing image...";
  document.getElementById("result").innerText = "";

  const formData = new FormData();
  formData.append("image", file);

  try{

    const response = await fetch(
      "https://crimesolver-api.onrender.com/api/crime/analyze",
      {
        method:"POST",
        body:formData
      }
    );

    const data = await response.json();

    document.getElementById("status").innerText = "Analysis complete";

    if(data.analysis && data.analysis.result){
      document.getElementById("result").innerText =
        "Result: " + data.analysis.result;
    }
    else{
      document.getElementById("result").innerText =
        "Analysis result received";
    }

  }
  catch(error){

    console.error(error);

    document.getElementById("status").innerText = "";
    document.getElementById("result").innerText =
      "Error analyzing image";

  }

}

</script>

</body>
</html>
