<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CrimeSolver Signup</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen text-white">

<div class="bg-gray-800 p-8 rounded-xl shadow-lg w-96">

<h2 class="text-2xl font-bold text-center text-blue-400 mb-2">
CrimeSolver
</h2>

<p class="text-gray-400 text-center mb-6">
Create account
</p>

<form id="signupForm">

<input
type="text"
placeholder="Name"
required
class="w-full p-3 mb-3 rounded bg-gray-700 border border-gray-600"
/>

<input
type="email"
placeholder="Email"
required
class="w-full p-3 mb-3 rounded bg-gray-700 border border-gray-600"
/>

<input
type="password"
placeholder="Password"
required
class="w-full p-3 mb-4 rounded bg-gray-700 border border-gray-600"
/>

<button
type="submit"
class="w-full bg-green-600 hover:bg-green-700 p-3 rounded font-semibold">
Create Account
</button>

</form>

<div class="text-center mt-4">
<span class="text-gray-400">Already have account?</span>
<a href="login.html" class="text-blue-400">Login</a>
</div>

</div>

<script src="auth.js"></script>

</body>
</html>
