<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - CrimeSceneSolver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <span class="text-xl font-bold text-blue-400">CrimeSceneSolver</span>
                    </div>
                </div>
                <div class="flex space-x-4">
                    <a href="index.html" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Home</a>
                    <a href="dashboard.html" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                    <a href="cases.html" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Cases</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-2xl w-full">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold mb-4">Upload Crime Scene Image</h1>
                <p class="text-gray-400">Upload an image for AI forensic analysis</p>
            </div>

            <div id="uploadArea" class="border-2 border-dashed border-gray-600 rounded-lg p-12 text-center hover:border-blue-500 transition-colors cursor-pointer">
                <div id="uploadContent">
                    <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-lg mb-2">Drag and drop your image here</p>
                    <p class="text-gray-400 mb-4">or</p>
                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors">
                        Browse Files
                    </button>
                    <p class="text-sm text-gray-500 mt-4">Supported formats: JPG, PNG, GIF (Max 10MB)</p>
                </div>
            </div>

            <input type="file" id="fileInput" accept="image/*" class="hidden">

            <div id="previewArea" class="hidden mt-8">
                <div class="bg-gray-800 rounded-lg p-6">
                    <h3 class="text-lg font-semibold mb-4">Image Preview</h3>
                    <img id="previewImage" class="w-full rounded-lg mb-4" alt="Preview">
                    <div class="flex space-x-4">
                        <button id="analyzeBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded transition-colors">
                            Analyze Image
                        </button>
                        <button id="clearBtn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded transition-colors">
                            Clear
                        </button>
                    </div>
                </div>
            </div>

            <div id="loadingArea" class="hidden mt-8">
                <div class="bg-gray-800 rounded-lg p-8 text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                    <p class="text-lg">AI analyzing crime scene...</p>
                    <p class="text-gray-400 mt-2">This may take a few moments</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
